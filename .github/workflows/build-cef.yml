name: Build CEF

on:
  workflow_dispatch:
    inputs:
      cef_branch:
        description: CEF branch number to build
        required: true
        default: "7204"
      build_target:
        description: CEF target to build before packaging
        required: true
        default: cefsimple
      with_pgo_profiles:
        description: Download Chromium PGO profiles where applicable
        required: true
        type: boolean
        default: false
      ninja_jobs:
        description: Optional Ninja job count. Leave empty to use the build default.
        required: false
        default: ""
      target:
        description: Target to build
        required: true
        type: choice
        default: windows-arm64
        options:
          - windows-arm64
          - windows-x64
          - linux-x64
          - linux-arm64
          - macos-arm64

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    if: ${{ inputs.target == matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            platform: windows
            runner: cef-windows-x64
            arch: x64
            download_dir: C:\cef
            gn_defines: is_official_build=true v8_enable_sandbox=false

          - name: windows-arm64
            platform: windows
            runner: cef-windows-x64
            arch: arm64
            download_dir: C:\cef
            gn_defines: is_official_build=true use_thin_lto=false chrome_pgo_phase=0 v8_enable_sandbox=false

          - name: linux-x64
            platform: linux
            runner: cef-linux-x64
            arch: x64
            download_dir: /tmp/cef
            gn_defines: is_official_build=true use_sysroot=true symbol_level=1 is_cfi=false v8_enable_sandbox=false

          - name: linux-arm64
            platform: linux
            runner: cef-linux-x64
            arch: arm64
            download_dir: /tmp/cef
            gn_defines: is_official_build=true use_sysroot=true symbol_level=1 is_cfi=false use_thin_lto=false chrome_pgo_phase=0 v8_enable_sandbox=false

          - name: macos-arm64
            platform: macos
            runner: cef-macos-arm64
            arch: arm64
            download_dir: /tmp/cef
            gn_defines: is_official_build=true v8_enable_sandbox=false

    env:
      CEF_BRANCH: ${{ inputs.cef_branch }}
      CEF_BUILD_TARGET: ${{ inputs.build_target }}
      CEF_ARCH: ${{ matrix.arch }}
      CEF_GN_DEFINES: ${{ matrix.gn_defines }}
      CEF_DOWNLOAD_DIR: ${{ matrix.download_dir }}
      CEF_WITH_PGO_PROFILES: ${{ inputs.with_pgo_profiles }}
      CEF_NINJA_JOBS: ${{ inputs.ninja_jobs }}

    steps:
      - name: Check out build scripts
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: bash scripts/install-linux-build-deps.sh

      - name: Build CEF on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: >
          ./scripts/build-cef.ps1
          -CefBranch "${env:CEF_BRANCH}"
          -DownloadDir "${env:CEF_DOWNLOAD_DIR}"
          -Arch "${env:CEF_ARCH}"
          -GnDefines "${env:CEF_GN_DEFINES}"
          -BuildTarget "${env:CEF_BUILD_TARGET}"
          -NinjaJobs "${env:CEF_NINJA_JOBS}"
          -WithPgoProfiles:([System.Convert]::ToBoolean("${env:CEF_WITH_PGO_PROFILES}"))

      - name: Build CEF on Unix
        if: matrix.platform != 'windows'
        shell: bash
        run: bash scripts/build-cef.sh

      - name: Upload CEF binary distributions
        uses: actions/upload-artifact@v4
        with:
          name: cef-${{ matrix.name }}-${{ inputs.cef_branch }}
          path: ${{ env.CEF_DOWNLOAD_DIR }}/chromium/src/cef/binary_distrib/*
          if-no-files-found: error
          retention-days: 14
