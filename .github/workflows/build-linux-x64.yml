name: Build CEF Linux x64

on:
  workflow_dispatch:
    inputs:
      cef_branch:
        description: CEF branch number to build
        required: true
        default: "7204"
      with_pgo_profiles:
        description: Download Chromium PGO profiles where applicable
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: linux-x64
    runs-on: cef-linux-x64-16c
    timeout-minutes: 360
    env:
      CEF_BRANCH: ${{ inputs.cef_branch }}
      CEF_BUILD_TARGET: cefsimple
      CEF_ARCH: x64
      CEF_GN_DEFINES: is_official_build=true use_sysroot=true symbol_level=1 is_cfi=false v8_enable_sandbox=false proprietary_codecs=true ffmpeg_branding=Chrome
      CEF_DOWNLOAD_DIR: /tmp/cef
      CEF_WITH_PGO_PROFILES: ${{ inputs.with_pgo_profiles }}

    steps:
      - name: Check out build scripts
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        shell: bash
        run: bash scripts/install-linux-build-deps.sh

      - name: Build CEF
        shell: bash
        run: bash scripts/build-cef.sh

      - name: Upload CEF binary distributions
        uses: actions/upload-artifact@v4
        with:
          name: cef-linux-x64-${{ inputs.cef_branch }}
          path: ${{ env.CEF_DOWNLOAD_DIR }}/chromium/src/cef/binary_distrib/*
          if-no-files-found: error
          retention-days: 14
