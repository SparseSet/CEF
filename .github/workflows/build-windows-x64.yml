name: Build CEF Windows x64

on:
  workflow_dispatch:
    inputs:
      cef_branch:
        description: CEF branch number to build
        required: true
        default: "7204"
      with_pgo_profiles:
        description: Download Chromium PGO profiles where applicable
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: windows-x64
    runs-on: cef-windows-x64
    timeout-minutes: 360
    env:
      CEF_BRANCH: ${{ inputs.cef_branch }}
      CEF_BUILD_TARGET: cefsimple
      CEF_ARCH: x64
      CEF_GN_DEFINES: is_official_build=true v8_enable_sandbox=false proprietary_codecs=true ffmpeg_branding=Chrome
      CEF_DOWNLOAD_DIR: C:\cef
      CEF_WITH_PGO_PROFILES: ${{ inputs.with_pgo_profiles }}

    steps:
      - name: Check out build scripts
        uses: actions/checkout@v4

      - name: Build CEF
        shell: pwsh
        run: >
          ./scripts/build-cef.ps1
          -CefBranch "${env:CEF_BRANCH}"
          -DownloadDir "${env:CEF_DOWNLOAD_DIR}"
          -Arch "${env:CEF_ARCH}"
          -GnDefines "${env:CEF_GN_DEFINES}"
          -BuildTarget "${env:CEF_BUILD_TARGET}"
          -WithPgoProfiles:([System.Convert]::ToBoolean("${env:CEF_WITH_PGO_PROFILES}"))

      - name: Upload CEF binary distributions
        uses: actions/upload-artifact@v4
        with:
          name: cef-windows-x64-${{ inputs.cef_branch }}
          path: ${{ env.CEF_DOWNLOAD_DIR }}/chromium/src/cef/binary_distrib/*
          if-no-files-found: error
          retention-days: 14
